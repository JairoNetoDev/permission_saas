services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: permissions_saas
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas123
    ports:
      - "5432:5432"
    volumes:
      - permission_saas_pgdata:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d permissions_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/permissions_saas
      SPRING_DATASOURCE_USERNAME: saas
      SPRING_DATASOURCE_PASSWORD: saas123
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "8080:8080"
      - "5005:5005"
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./pom.xml
        - action: rebuild
          path: ./.env

volumes:
  permission_saas_pgdata:
