spring:
  application:
    name: permission_saas

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/permissions_saas}
    username: ${SPRING_DATASOURCE_USERNAME:saas}
    password: ${SPRING_DATASOURCE_PASSWORD:saas123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

flyway:
  enabled: true
  locations: classpath:db/migration
  ignore-migration-patterns: "*:missing,*:future"
  validate-on-migrate: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
